spring.application.name=infracciones

# === Conexion a MySQL ===
spring.datasource.url=jdbc:mysql://localhost:3306/infraccionesbasededatos?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Argentina/Buenos_Aires
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:1234}

# === JPA / Hibernate ===
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# === Thymeleaf (para servir HTMLs) ===
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false